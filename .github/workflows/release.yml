name: Release

permissions:
  contents: write
  issues: write
  pull-requests: write

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Run Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync GitHub Release Notes From CHANGELOG
        run: |
          TAG="$(git tag --points-at HEAD | tail -n 1)"
          if [ -z "$TAG" ]; then
            echo "No new release tag on HEAD; skipping changelog sync."
            exit 0
          fi
          RELEASE_TAG="$TAG" node scripts/sync-github-release-from-changelog.cjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
